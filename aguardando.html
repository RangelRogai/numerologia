<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aguardando Aprovação</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0b0b0b, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 380px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 50px 40px;
  border-radius: 15px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.logo {
  width: 100px;
  margin-bottom: 20px;
}

.icone {
  font-size: 52px;
  margin-bottom: 15px;
  animation: pulsar 2s infinite;
}

@keyframes pulsar {
  0%   { transform: scale(1); opacity: 1; }
  50%  { transform: scale(1.1); opacity: 0.7; }
  100% { transform: scale(1); opacity: 1; }
}

h1 {
  font-size: 22px;
  margin-bottom: 12px;
  color: #caa85e;
}

p {
  font-size: 15px;
  color: #aaa;
  line-height: 1.6;
  margin-bottom: 10px;
}

.destaque {
  color: #fff;
  font-weight: bold;
}

.caixa-info {
  margin-top: 25px;
  background: rgba(202, 168, 94, 0.1);
  border: 1px solid #caa85e44;
  border-radius: 10px;
  padding: 16px;
  font-size: 14px;
  color: #caa85e;
  line-height: 1.6;
}

.btn-voltar {
  display: inline-block;
  margin-top: 28px;
  padding: 11px 28px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #7f5af0, #2cb67d);
  color: white;
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
}

.btn-voltar:hover {
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo">

  <div class="icone">⏳</div>

  <h1>Cadastro Recebido!</h1>

  <p>Seu acesso está sendo <span class="destaque">analisado pelo administrador</span>.</p>
  <p>Assim que for aprovado, você poderá entrar normalmente.</p>

  <div class="caixa-info">
    📩 Fique de olho no seu e-mail ou aguarde o contato do administrador informando que seu acesso foi liberado.
  </div>

  <a href="index.html" class="btn-voltar">← Voltar para o início</a>
</div>

</body>
</html>
