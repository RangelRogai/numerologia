<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Numerologia Arquetípica</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0b0b0b, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 350px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 15px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.logo {
  width: 120px;
  margin-bottom: 15px;
}

h1 {
  font-size: 22px;
  margin: 10px 0;
}

.subtitle {
  color: #caa85e;
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #7f5af0, #2cb67d);
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.mensagem {
  margin-top: 20px;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  display: none;
}

.mensagem.pendente {
  background: rgba(202, 168, 94, 0.2);
  border: 1px solid #caa85e;
  color: #caa85e;
}

.mensagem.negado {
  background: rgba(255, 80, 80, 0.2);
  border: 1px solid #ff5050;
  color: #ff5050;
}
</style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo">

  <h1>Numerologia Arquetípica</h1>
  <div class="subtitle">Mapa Completo</div>

  <button onclick="login()">Entrar com Google</button>

  <div class="mensagem pendente" id="msg-pendente">
    ⏳ Seu acesso está sendo analisado.<br>
    Aguarde a aprovação e tente novamente em breve.
  </div>

  <div class="mensagem negado" id="msg-negado">
    ❌ Acesso não autorizado.<br>
    Entre em contato com o administrador.
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://bbochtktsyrvkccbkgur.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJib2NodGt0c3lydmtjY2JrZ3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzM0MzUsImV4cCI6MjA5MjA0OTQzNX0.i3XFaK10ziRC6USBm-pw9pOoXIvzY2LgDaskDCDyd1E'
)

window.login = async function () {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://exquisite-platypus-223951.netlify.app/index.html'
    }
  })
}

supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    await checkUser()
  }
})

async function checkUser() {
  const { data: userData } = await supabase.auth.getUser()

  if (!userData?.user) return

  const email = userData.user.email

  // Busca o email na tabela
  const { data, error } = await supabase
    .from('permitidos')
    .select('status')
    .eq('email', email)
    .single()

  // Email não encontrado — cadastra como pendente
  if (error || !data) {
    await supabase.from('permitidos').insert([
      { email: email, status: 'pendente' }
    ])
    await supabase.auth.signOut()
    document.getElementById('msg-pendente').style.display = 'block'
    return
  }

  // Email encontrado — verifica status
  if (data.status === 'aprovado') {
    window.location.href = 'calculadora.html'
  } else if (data.status === 'pendente') {
    await supabase.auth.signOut()
    document.getElementById('msg-pendente').style.display = 'block'
  } else {
    await supabase.auth.signOut()
    document.getElementById('msg-negado').style.display = 'block'
  }
}

checkUser()
</script>

</body>
</html>
